<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                flex-direction: column;
                font-family: Arial;
            }
        </style>
        <body>
            <h1>Change Background Color</h1>
            <button onclick="changeColor()">To Change the Background Color Click Here</button>
            <script>
                function changeColor(){
                    let colors=["red","green","blue","yellow","pink","Aqua","purple","black",];
                    let randomColor=colors[Math.floor(Math.random()*colors.length)];
                    document.body.style.background=randomColor;
                }
            </script>
        </body>
    </head>
</html>
